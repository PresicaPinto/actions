name: Staging/Production Deployment

on:
  push:
    branches: [ main, master ]
  # Allows manual deployment from the GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Remote Server
    runs-on: ubuntu-latest
    # Run only after Docker Push succeeds
    # (Note: In a single workflow we use 'needs', but across files it's triggerable manually or on branch pushes)
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Connection
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          "cd /var/www/gocart && \
           docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} && \
           docker compose pull && \
           docker compose up -d --remove-orphans && \
           docker image prune -f"
        # Optional: Add Prisma migrations step if database is hooked up
        # docker compose exec web npx prisma db push --accept-data-loss
