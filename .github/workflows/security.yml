name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Dependency Audit
        run: npm audit --audit-level=high
        # Note: If there are known non-critical audit issues that can't be resolved,
        # you can add "|| true" to prevent blocking builds, but for best practices we fail on high vulnerabilities.
